name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses 2>/dev/null || true

    - name: Install Android SDK platforms and build tools
      run: sdkmanager --install "platforms;android-36" "build-tools;34.0.0" "ndk;28.2.13676358" 2>/dev/null || true

    - name: Ensure assets directory exists
      run: mkdir -p assets/images

    - name: Install dependencies
      run: flutter pub get

    - name: Build APK
      run: flutter build apk --release

    - name: Rename APK to HacheJota.apk
      run: |
        cp build/app/outputs/flutter-apk/app-release.apk HacheJota.apk
        echo "APK_SIZE=$(du -h HacheJota.apk | cut -f1)" >> $GITHUB_ENV

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: HacheJota-apk
        path: HacheJota.apk

    - name: Generate release tag
      id: tag
      run: |
        TAG="v$(date +'%Y.%m.%d-%H%M')"
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Create Release with APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: "HacheJota APK Free - ${{ steps.tag.outputs.tag }}"
        body: |
          ## HacheJota APK - Version Libre

          - Sin VIP
          - Sin Anuncios
          - 100% Libre

          **Tamano del APK:** ${{ env.APK_SIZE }}

          ### Como instalar
          1. Descarga `HacheJota.apk`
          2. Activa "Origenes desconocidos" en tu dispositivo Android
          3. Instala el APK
        files: |
          HacheJota.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
