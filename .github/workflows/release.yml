name: Release APK

on:
  push:
    branches: [main]
    paths:
      - 'apk/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.date.outputs.date }}
          name: HacheJota IPTV - ${{ steps.date.outputs.date }}
          body: |
            🔓 HacheJota IPTV Liberado
            
            - ✅ VIP/Premium eliminado
            - ✅ Anuncios eliminados  
            - ✅ Compatibilidad mejorada (targetSdk 34)
            - ✅ Suscripciones eliminadas
          files: |
            apk/HacheJota.apk
