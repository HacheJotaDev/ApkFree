name: xtream_iptv
description: XTREAM IPTV Player - No VIP, No Ads
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.6
  media_kit_libs_windows_video: ^1.0.10
  http: ^1.2.1
  provider: ^6.1.2
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1
  flutter_spinkit: ^5.2.1
  wakelock_plus: ^1.2.8
  url_launcher: ^6.3.1
  share_plus: ^10.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

dev_dependencies:
  flutter_test:
    sdk: flutter
